<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbot</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --text-dark: #1f2937;
            --text-light: #f9fafb;
            --bot-msg-bg: #f3f4f6;
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            max-width: 800px;
            height: 95vh;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- API Key Setup Screen --- */
        #api-setup {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 2rem;
            text-align: center;
        }

        #api-setup h2 { margin-bottom: 1rem; }
        #api-setup p { margin-bottom: 2rem; color: #6b7280; font-size: 0.95rem; }

        .input-group {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        input[type="password"], input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); }

        button {
            padding: 12px 20px;
            background-color: var(--primary);
            color: var(--text-light);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }

        /* --- Chat Interface --- */
        #chat-interface {
            display: none; /* Hidden until API key is set */
            flex-direction: column;
            height: 100%;
        }

        #chat-header {
            padding: 1rem 1.5rem;
            background: var(--chat-bg);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            width: 100%;
        }

        .message.user { justify-content: flex-end; }
        .message.model { justify-content: flex-start; }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap; /* Keeps formatting and line breaks */
            word-wrap: break-word;
        }

        .message.user .bubble {
            background-color: var(--primary);
            color: var(--text-light);
            border-bottom-right-radius: 2px;
        }

        .message.model .bubble {
            background-color: var(--bot-msg-bg);
            color: var(--text-dark);
            border-bottom-left-radius: 2px;
        }

        #input-area {
            padding: 1rem 1.5rem;
            background: var(--chat-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .loader {
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Setup Screen -->
        <div id="api-setup">
            <h2>Gemini 3.1 Flash Lite</h2>
            <p>Enter your Google Gemini API key to start chatting. The key is only stored locally in your browser session.</p>
            <div class="input-group">
                <input type="password" id="api-key-input" placeholder="AIzaSy...">
                <button id="start-btn">Start Chat</button>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-interface">
            <div id="chat-header">
                <span>AI Chatbot</span>
                <span style="font-size: 0.8rem; font-weight: normal; color: #6b7280;">Model: gemini-3.1-flash-lite-preview</span>
            </div>
            <div id="messages">
                <!-- Messages will appear here -->
            </div>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <!-- Main Logic -->
    <script type="module">
        // Importing the official SDK directly into the browser via esm.sh CDN
        import { GoogleGenAI } from "https://esm.sh/@google/genai";

        // Application State
        let ai = null;
        let chatHistory =[]; 

        // DOM Elements
        const apiSetupDiv = document.getElementById('api-setup');
        const chatInterfaceDiv = document.getElementById('chat-interface');
        const apiKeyInput = document.getElementById('api-key-input');
        const startBtn = document.getElementById('start-btn');
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Initialize API and UI
        startBtn.addEventListener('click', () => {
            const apiKey = apiKeyInput.value.trim();
            if (apiKey) {
                try {
                    // Initialize the AI client based on your provided code
                    ai = new GoogleGenAI({ apiKey: apiKey });
                    apiSetupDiv.style.display = 'none';
                    chatInterfaceDiv.style.display = 'flex';
                    userInput.focus();
                } catch (err) {
                    alert("Error initializing AI client: " + err.message);
                }
            } else {
                alert("Please enter a valid API Key.");
            }
        });

        // Handle sending messages
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !ai) return;

            // 1. Clear input & disable UI temporarily
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            // 2. Add User Message to UI and History
            appendMessage('user', text);
            chatHistory.push({
                role: 'user',
                parts: [{ text: text }]
            });

            // 3. Create an empty bubble for the AI response
            const botBubble = appendMessage('model', 'Thinking...');
            botBubble.classList.add('loader');

            try {
                // Configurations directly from your provided snippet
                const tools =[
                    { googleSearch: {} }
                ];
                const config = {
                    thinkingConfig: {
                        thinkingLevel: 'MINIMAL',
                    },
                    tools: tools,
                };
                const model = 'gemini-3.1-flash-lite-preview';

                // Call the API with Streaming
                const response = await ai.models.generateContentStream({
                    model: model,
                    config: config,
                    contents: chatHistory, 
                });

                botBubble.textContent = ''; // Clear "Thinking..."
                botBubble.classList.remove('loader');
                let fullResponse = '';

                // Read chunks as they arrive
                for await (const chunk of response) {
                    if (chunk.text) {
                        fullResponse += chunk.text;
                        botBubble.textContent = fullResponse;
                        scrollToBottom();
                    }
                }

                // Save the AI's final response to the history so it remembers the context
                chatHistory.push({
                    role: 'model',
                    parts:[{ text: fullResponse }]
                });

            } catch (error) {
                console.error(error);
                botBubble.classList.remove('loader');
                botBubble.textContent = "Error: " + error.message;
            } finally {
                // Re-enable input
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // Event Listeners for Chat
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Helper functions
        function appendMessage(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.textContent = text;
            
            messageDiv.appendChild(bubbleDiv);
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
            
            return bubbleDiv; // Return bubble to allow updating text later (for streaming)
        }

        function scrollToBottom() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
