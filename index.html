<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live Agent - Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #020617);
            color: #f8fafc;
            overflow: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .mic-shadow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        .live-pulse {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(.33); }
            80%, 100% { opacity: 0; }
        }
        #transcript::-webkit-scrollbar { width: 5px; }
        #transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg glass rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col h-[85vh]">
        <!-- Status Bar -->
        <div class="px-8 py-5 flex justify-between items-center border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-600/20 flex items-center justify-center">
                    <iconify-icon icon="logos:google-gemini" width="24"></iconify-icon>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">Gemini Live</h1>
                    <div class="flex items-center gap-2">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-500"></span>
                        <span id="status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Disconnected</span>
                    </div>
                </div>
            </div>
            <button id="settings-toggle" class="text-slate-400 hover:text-white transition-colors">
                <iconify-icon icon="lucide:settings" width="20"></iconify-icon>
            </button>
        </div>

        <!-- Settings Panel -->
        <div id="settings-panel" class="px-8 py-4 bg-black/20 border-b border-white/5 hidden shrink-0">
            <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">API Configuration</label>
            <div class="flex gap-2">
                <input id="api-key" type="password" placeholder="Enter Gemini API Key" 
                    class="flex-1 bg-slate-900/50 border border-white/10 rounded-lg px-4 py-2 text-xs outline-none focus:border-blue-500 transition-all">
                <button id="save-key" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold transition-all">SAVE</button>
            </div>
            <p class="text-[9px] text-slate-500 mt-2 italic">Key is saved locally in your browser.</p>
        </div>

        <!-- Main Content (Transcript + Chat Input) -->
        <div class="p-6 flex-1 flex flex-col overflow-hidden gap-4">
            
            <!-- Transcript Area -->
            <div id="transcript-container" class="relative flex-1 bg-black/20 rounded-3xl border border-white/5 p-6 overflow-hidden flex flex-col">
                <div id="transcript" class="flex-1 overflow-y-auto text-sm text-slate-300 leading-relaxed space-y-4 pb-4">
                    <p class="text-slate-500 italic text-center mt-20">Connect to start the conversation...</p>
                </div>
                <div class="absolute bottom-0 left-0 w-full h-8 bg-gradient-to-t from-slate-900/90 to-transparent pointer-events-none"></div>
            </div>

            <!-- Text Input Area -->
            <div class="flex gap-2 shrink-0">
                <input id="chat-input" type="text" placeholder="Type a message..." disabled
                    class="flex-1 bg-black/30 border border-white/10 rounded-2xl px-5 py-3 text-sm text-white outline-none focus:border-blue-500 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                <button id="send-btn" disabled class="bg-blue-600 hover:bg-blue-500 text-white w-12 h-12 rounded-2xl flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                    <iconify-icon icon="lucide:send" width="20"></iconify-icon>
                </button>
            </div>
        </div>

        <!-- Controls (Mic & End Call) -->
        <div class="pb-8 pt-2 flex flex-col items-center justify-center gap-4 shrink-0">
            <div class="flex items-center justify-center gap-6">
                <!-- End Call Button (Hidden initially) -->
                <button id="end-btn" class="hidden w-12 h-12 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-lg">
                    <iconify-icon icon="lucide:phone-off" width="20"></iconify-icon>
                </button>

                <!-- Main Mic Button -->
                <div class="relative">
                    <div id="pulse-ring" class="absolute inset-0 rounded-full bg-blue-500/30 live-pulse hidden"></div>
                    <button id="main-btn" class="relative w-20 h-20 rounded-full bg-white text-slate-900 flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-all mic-shadow">
                        <iconify-icon id="btn-icon" icon="lucide:mic" width="32"></iconify-icon>
                    </button>
                </div>
            </div>
            
            <p id="instruction" class="text-xs font-semibold text-slate-400">Tap Mic to connect</p>
        </div>

        <!-- Footer -->
        <div class="px-8 py-3 bg-white/5 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-2">
                <iconify-icon icon="lucide:mic-2" class="text-slate-500"></iconify-icon>
                <select id="mic-select" class="bg-transparent text-[10px] font-bold text-slate-500 outline-none cursor-pointer uppercase w-24 truncate">
                    <option value="">Default Mic</option>
                </select>
            </div>
            <span class="text-[10px] font-mono text-slate-600">ZEPHYR • 2.5 FLASH</span>
        </div>
    </div>

    <script>
        // --- CONFIG & STATE ---
        const MODEL = "models/gemini-2.5-flash-native-audio-preview-12-2025";
        const WS_URL = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent";
        
        let socket = null;
        let audioCtx = null;
        let stream = null;
        let processor = null;
        let nextTime = 0;
        
        let isLive = false;   // Is WebSocket Connected?
        let isMicOn = false;  // Is Mic currently listening/sending?
        let currentBotBubble = null; 

        // UI Elements
        const mainBtn = document.getElementById('main-btn');
        const btnIcon = document.getElementById('btn-icon');
        const endBtn = document.getElementById('end-btn');
        const pulseRing = document.getElementById('pulse-ring');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const transcript = document.getElementById('transcript');
        const apiKeyInput = document.getElementById('api-key');
        const settingsPanel = document.getElementById('settings-panel');
        const micSelect = document.getElementById('mic-select');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const instruction = document.getElementById('instruction');

        // --- API KEY PERSISTENCE ---
        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
                statusText.innerText = "Ready to connect";
            } else {
                settingsPanel.classList.remove('hidden');
            }
        };

        document.getElementById('save-key').onclick = () => {
            localStorage.setItem('gemini_api_key', apiKeyInput.value.trim());
            settingsPanel.classList.add('hidden');
            alert("API Key Saved!");
        };

        document.getElementById('settings-toggle').onclick = () => settingsPanel.classList.toggle('hidden');

        // --- CORE LOGIC ---
        async function startSession() {
            const key = apiKeyInput.value.trim();
            if (!key) return alert("Please enter API Key in settings!");

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            updateStatus('Connecting...', 'bg-yellow-500');

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    audio: micSelect.value ? { deviceId: micSelect.value, echoCancellation: true, noiseSuppression: true } : { echoCancellation: true, noiseSuppression: true }
                });

                socket = new WebSocket(`${WS_URL}?key=${key}`);

                socket.onopen = () => {
                    const setup = {
                        setup: {
                            model: MODEL,
                            generationConfig: {
                                responseModalities: ["AUDIO"], // This returns BOTH Audio and Text
                                speechConfig: {
                                    voiceConfig: { prebuiltVoiceConfig: { voiceName: "Zephyr" } }
                                }
                            }
                        }
                    };
                    socket.send(JSON.stringify(setup));
                    
                    initAudio();
                    
                    isLive = true;
                    isMicOn = true; // Mic starts ON by default
                    updateUIState();
                    updateStatus('Connected', 'bg-emerald-500');
                    addTranscript("System", "Connected! You can speak or type your message.", "text-emerald-400");
                };

                socket.onmessage = async (e) => {
                    const data = JSON.parse(e.data);
                    
                    if (data.serverContent?.modelTurn?.parts) {
                        data.serverContent.modelTurn.parts.forEach(p => {
                            if (p.inlineData && p.inlineData.data) {
                                playAudio(p.inlineData.data);
                            }
                            if (p.text) {
                                appendBotText(p.text);
                            }
                        });
                    }

                    if (data.serverContent?.turnComplete) {
                        currentBotBubble = null; 
                    }
                };

                socket.onclose = () => stopSession();
                socket.onerror = () => {
                    alert("Connection Error! Check your internet or API Key.");
                    stopSession();
                };

            } catch (err) {
                console.error(err);
                alert("Mic Access Denied or System Error!");
                stopSession();
            }
        }

        async function initAudio() {
            const source = audioCtx.createMediaStreamSource(stream);
            const workletCode = `
                class P extends AudioWorkletProcessor {
                    process(inputs) {
                        const input = inputs[0][0];
                        if (input) {
                            const i16 = new Int16Array(input.length);
                            for (let i=0; i<input.length; i++) i16[i] = input[i] * 0x7FFF;
                            this.port.postMessage(i16.buffer);
                        }
                        return true;
                    }
                }
                registerProcessor('p', P);
            `;
            const blob = new Blob([workletCode], { type: 'application/javascript' });
            await audioCtx.audioWorklet.addModule(URL.createObjectURL(blob));
            
            processor = new AudioWorkletNode(audioCtx, 'p');
            
            let pcmBuffer =[];
            processor.port.onmessage = (e) => {
                // ONLY send audio if Live AND Mic is ON
                if (!isLive || !isMicOn || socket?.readyState !== WebSocket.OPEN) return;
                
                const arr = new Uint8Array(e.data);
                for(let i = 0; i < arr.length; i++) pcmBuffer.push(arr[i]);

                if (pcmBuffer.length >= 3200) {
                    const chunk = new Uint8Array(pcmBuffer);
                    pcmBuffer =[];
                    let binary = '';
                    for (let i = 0; i < chunk.length; i++) binary += String.fromCharCode(chunk[i]);
                    
                    socket.send(JSON.stringify({
                        realtimeInput: {
                            mediaChunks:[{ mimeType: "audio/pcm;rate=16000", data: btoa(binary) }]
                        }
                    }));
                }
            };
            source.connect(processor);
        }

        function playAudio(b64) {
            const bin = atob(b64);
            const buffer = new ArrayBuffer(bin.length);
            const view = new Uint8Array(buffer);
            for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
            
            const i16 = new Int16Array(buffer);
            const f32 = new Float32Array(i16.length);
            for (let i=0; i<i16.length; i++) f32[i] = i16[i] / 32768;

            const buf = audioCtx.createBuffer(1, f32.length, 24000);
            buf.copyToChannel(f32, 0);
            const node = audioCtx.createBufferSource();
            node.buffer = buf;
            node.connect(audioCtx.destination);
            
            let now = audioCtx.currentTime;
            if (nextTime < now) nextTime = now;
            
            node.start(nextTime);
            nextTime += buf.duration;
        }

        // --- TEXT CHAT LOGIC ---
        function sendTextMessage() {
            const text = chatInput.value.trim();
            if (!text || !isLive || socket?.readyState !== WebSocket.OPEN) return;

            // Show user message in UI
            addTranscript("You", text, "text-blue-400");
            
            // Send text to Gemini API
            const msg = {
                clientContent: {
                    turns: [{ role: "user", parts:[{ text: text }] }],
                    turnComplete: true
                }
            };
            socket.send(JSON.stringify(msg));
            
            chatInput.value = "";
        }

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendTextMessage();
        });
        sendBtn.onclick = sendTextMessage;

        // --- UI HELPERS ---
        function updateUIState() {
            if (isLive) {
                chatInput.disabled = false;
                sendBtn.disabled = false;
                endBtn.classList.remove('hidden');
                
                if (transcript.innerText.includes("Connect to start")) transcript.innerHTML = "";

                if (isMicOn) {
                    // Mic is Active
                    mainBtn.className = "relative w-20 h-20 rounded-full bg-white text-slate-900 flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-all mic-shadow";
                    btnIcon.setAttribute('icon', 'lucide:mic');
                    pulseRing.classList.remove('hidden');
                    instruction.innerText = "Listening... Tap to Mute";
                } else {
                    // Mic is Muted
                    mainBtn.className = "relative w-20 h-20 rounded-full bg-slate-800 text-red-400 border border-red-500/30 flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all";
                    btnIcon.setAttribute('icon', 'lucide:mic-off');
                    pulseRing.classList.add('hidden');
                    instruction.innerText = "Mic Muted. Tap to Unmute";
                }
            } else {
                // Disconnected State
                chatInput.disabled = true;
                sendBtn.disabled = true;
                endBtn.classList.add('hidden');
                pulseRing.classList.add('hidden');
                
                mainBtn.className = "relative w-20 h-20 rounded-full bg-white text-slate-900 flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-all mic-shadow";
                btnIcon.setAttribute('icon', 'lucide:mic');
                instruction.innerText = "Tap Mic to connect";
            }
        }

        function updateStatus(txt, color) {
            statusText.innerText = txt;
            statusDot.className = `w-2 h-2 rounded-full ${color}`;
        }

        function addTranscript(role, text, colorClass = "text-blue-400") {
            const div = document.createElement('div');
            div.className = "animate-in slide-in-from-bottom-2 duration-300 mb-4 bg-white/5 p-3 rounded-2xl w-fit max-w-[85%]";
            if(role === "You") div.className += " ml-auto bg-blue-600/20 border border-blue-500/20";
            
            div.innerHTML = `<span class="text-[10px] font-bold uppercase tracking-widest ${colorClass}">${role}</span>
                           <p class="text-slate-200 mt-1">${text}</p>`;
            transcript.appendChild(div);
            transcript.scrollTop = transcript.scrollHeight;
        }

        function appendBotText(text) {
            if (!currentBotBubble) {
                const div = document.createElement('div');
                div.className = "animate-in slide-in-from-bottom-2 duration-300 mb-4 bg-white/5 p-3 rounded-2xl w-fit max-w-[85%] border border-white/10";
                div.innerHTML = `<span class="text-[10px] font-bold uppercase tracking-widest text-emerald-400">Gemini</span>
                               <p class="text-slate-200 mt-1 bot-text"></p>`;
                transcript.appendChild(div);
                currentBotBubble = div.querySelector('.bot-text');
            }
            currentBotBubble.innerHTML += text;
            transcript.scrollTop = transcript.scrollHeight;
        }

        function stopSession() {
            isLive = false;
            isMicOn = false;
            if (socket) { socket.close(); socket = null; }
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (audioCtx) audioCtx.suspend(); 
            
            updateUIState();
            updateStatus('Disconnected', 'bg-slate-500');
            nextTime = 0;
            currentBotBubble = null;
            addTranscript("System", "Session ended.", "text-red-400");
        }

        // --- BUTTON ACTIONS ---
        mainBtn.onclick = () => {
            if (!isLive) {
                startSession(); // Connect if not connected
            } else {
                isMicOn = !isMicOn; // Toggle Mic if already connected
                updateUIState();
            }
        };

        endBtn.onclick = stopSession; // Red button to disconnect

        // Mic Enumeration
        navigator.mediaDevices.enumerateDevices().then(devs => {
            micSelect.innerHTML = '<option value="">Default Mic</option>';
            devs.filter(d => d.kind === 'audioinput').forEach(d => {
                const o = document.createElement('option');
                o.value = d.deviceId;
                o.text = d.label || 'Microphone';
                micSelect.appendChild(o);
            });
        });
    </script>
</body>
</html>
