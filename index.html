<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live - Zephyr Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; }
        .glow-btn { transition: all 0.3s ease; box-shadow: 0 0 0 rgba(59, 130, 246, 0); }
        .glow-btn:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); transform: scale(1.02); }
        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        #transcript::-webkit-scrollbar { width: 4px; }
        #transcript::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-slate-900/50 border border-slate-800 rounded-[2.5rem] p-8 backdrop-blur-xl shadow-2xl">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">Gemini Live</h1>
                <p class="text-slate-500 text-xs font-semibold tracking-widest uppercase mt-1">Zephyr Voice Engine</p>
            </div>
            <div id="status-badge" class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-slate-800 border border-slate-700">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-600"></span>
                <span id="status-text" class="text-[10px] font-bold text-slate-400 uppercase">Offline</span>
            </div>
        </div>

        <!-- API Key Input -->
        <div id="setup-box" class="mb-8 space-y-3">
            <label class="text-xs font-bold text-slate-400 uppercase ml-1">Gemini API Key</label>
            <div class="relative">
                <input id="api-key" type="password" placeholder="Enter your API key..." 
                    class="w-full bg-slate-950/50 border border-slate-700 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 outline-none transition-all text-blue-100">
                <iconify-icon icon="lucide:key" class="absolute right-5 top-4 text-slate-600" width="20"></iconify-icon>
            </div>
        </div>

        <!-- Transcript Area -->
        <div id="transcript-box" class="hidden mb-8 animate-in fade-in duration-500">
            <div id="transcript" class="h-48 overflow-y-auto bg-slate-950/30 border border-slate-800/50 rounded-3xl p-6 text-sm text-slate-300 leading-relaxed italic">
                Start speaking to see transcript...
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col items-center gap-6">
            <button id="action-btn" class="glow-btn w-24 h-24 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-lg">
                <iconify-icon id="btn-icon" icon="lucide:mic" width="36"></iconify-icon>
            </button>
            
            <div class="text-center">
                <p id="instruction" class="text-sm text-slate-400 font-medium">Click to start live session</p>
                <button id="stop-btn" class="hidden mt-4 text-xs font-bold text-red-400 hover:text-red-300 transition-colors uppercase tracking-widest">
                    End Session
                </button>
            </div>
        </div>

        <!-- Mic Select -->
        <div class="mt-10 pt-6 border-t border-slate-800/50 flex justify-between items-center">
            <select id="mic-select" class="bg-transparent text-[10px] font-bold text-slate-500 outline-none uppercase cursor-pointer">
                <option value="">Default Microphone</option>
            </select>
            <span class="text-[10px] font-mono text-slate-600">v2.5-FLASH-AUDIO</span>
        </div>
    </div>

    <script>
        /**
         * CONFIGURATION FROM YOUR TS CODE
         */
        const MODEL = "models/gemini-2.5-flash-native-audio-preview-12-2025";
        const WS_URL = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BiDiGenerateContent";

        let socket = null;
        let audioContext = null;
        let micStream = null;
        let processor = null;
        let nextPlayTime = 0;
        let isLive = false;

        const btn = document.getElementById('action-btn');
        const btnIcon = document.getElementById('btn-icon');
        const stopBtn = document.getElementById('stop-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const transcript = document.getElementById('transcript');
        const apiKeyInput = document.getElementById('api-key');
        const micSelect = document.getElementById('mic-select');

        /**
         * START SESSION
         */
        async function startSession() {
            const key = apiKeyInput.value.trim();
            if (!key) return alert("Please enter API Key!");

            try {
                // 1. Get Mic Permission
                micStream = await navigator.mediaDevices.getUserMedia({
                    audio: micSelect.value ? { deviceId: micSelect.value } : true
                });

                // 2. Connect WebSocket
                socket = new WebSocket(`${WS_URL}?key=${key}`);

                socket.onopen = () => {
                    updateStatus('Connected', 'bg-blue-500');
                    sendSetup();
                    initAudioEngine();
                    toggleUI(true);
                };

                socket.onmessage = async (event) => {
                    const msg = JSON.parse(event.data);
                    handleServerMessage(msg);
                };

                socket.onclose = () => stopSession();
                socket.onerror = () => alert("Connection Error!");

            } catch (err) {
                console.error(err);
                alert("Mic access denied!");
            }
        }

        /**
         * SEND SETUP (With Zephyr Voice)
         */
        function sendSetup() {
            const setup = {
                setup: {
                    model: MODEL,
                    generation_config: {
                        response_modalities: ["audio"],
                        speech_config: {
                            voice_config: {
                                prebuilt_voice_config: {
                                    voice_name: "Zephyr" // As per your TS code
                                }
                            }
                        }
                    }
                }
            };
            socket.send(JSON.stringify(setup));
        }

        /**
         * AUDIO ENGINE (Input & Output)
         */
        async function initAudioEngine() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            
            // Input: Mic -> WebSocket
            const source = audioContext.createMediaStreamSource(micStream);
            const workletCode = `
                class Recorder extends AudioWorkletProcessor {
                    process(inputs) {
                        const input = inputs[0][0];
                        if (input) {
                            const i16 = new Int16Array(input.length);
                            for (let i=0; i<input.length; i++) i16[i] = input[i] * 0x7FFF;
                            this.port.postMessage(i16.buffer);
                        }
                        return true;
                    }
                }
                registerProcessor('recorder', Recorder);
            `;
            const blob = new Blob([workletCode], { type: 'application/javascript' });
            await audioContext.audioWorklet.addModule(URL.createObjectURL(blob));
            
            processor = new AudioWorkletNode(audioContext, 'recorder');
            processor.port.onmessage = (e) => {
                if (socket && socket.readyState === WebSocket.OPEN) {
                    const b64 = btoa(String.fromCharCode(...new Uint8Array(e.data)));
                    socket.send(JSON.stringify({
                        realtime_input: {
                            media_chunks: [{ mime_type: "audio/pcm;rate=16000", data: b64 }]
                        }
                    }));
                }
            };
            source.connect(processor);
        }

        function handleServerMessage(msg) {
            if (msg.serverContent?.modelTurn?.parts) {
                msg.serverContent.modelTurn.parts.forEach(part => {
                    if (part.inlineData) playAudio(part.inlineData.data);
                    if (part.text) updateTranscript("Gemini: " + part.text);
                });
            }
        }

        function playAudio(b64) {
            const bin = atob(b64);
            const i16 = new Int16Array(new Uint8Array([...bin].map(c => c.charCodeAt(0))).buffer);
            const f32 = new Float32Array(i16.length);
            for (let i=0; i<i16.length; i++) f32[i] = i16[i] / 32768;

            const buf = audioContext.createBuffer(1, f32.length, 24000);
            buf.copyToChannel(f32, 0);
            const node = audioContext.createBufferSource();
            node.buffer = buf;
            node.connect(audioContext.destination);
            
            const start = Math.max(nextPlayTime, audioContext.currentTime);
            node.start(start);
            nextPlayTime = start + buf.duration;
        }

        /**
         * UI HELPERS
         */
        function toggleUI(live) {
            isLive = live;
            btn.classList.toggle('bg-red-500', live);
            btn.classList.toggle('recording-pulse', live);
            btnIcon.setAttribute('icon', live ? 'lucide:mic-off' : 'lucide:mic');
            stopBtn.classList.toggle('hidden', !live);
            document.getElementById('setup-box').classList.toggle('hidden', live);
            document.getElementById('transcript-box').classList.toggle('hidden', !live);
            document.getElementById('instruction').innerText = live ? "Listening..." : "Click to start live session";
        }

        function updateStatus(txt, color) {
            statusText.innerText = txt;
            statusDot.className = `w-2 h-2 rounded-full ${color}`;
        }

        function updateTranscript(t) {
            if (transcript.innerText.includes("Start speaking")) transcript.innerText = "";
            transcript.innerHTML += `<p class="mb-2 border-l-2 border-blue-500 pl-3">${t}</p>`;
            transcript.scrollTop = transcript.scrollHeight;
        }

        function stopSession() {
            if (socket) socket.close();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();
            toggleUI(false);
            updateStatus('Offline', 'bg-slate-600');
            nextPlayTime = 0;
        }

        // Mic List
        navigator.mediaDevices.enumerateDevices().then(devs => {
            devs.filter(d => d.kind === 'audioinput').forEach(d => {
                const o = document.createElement('option');
                o.value = d.deviceId;
                o.text = d.label || 'Microphone';
                micSelect.appendChild(o);
            });
        });

        btn.onclick = () => isLive ? stopSession() : startSession();
        stopBtn.onclick = stopSession;
    </script>
</body>
</html>
