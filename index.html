<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live Agent - Single File</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        #transcript::-webkit-scrollbar { width: 4px; }
        #transcript::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <!-- Header -->
        <div class="p-6 border-b border-gray-50 flex justify-between items-center bg-white">
            <div>
                <h1 class="text-xl font-bold text-gray-900 tracking-tight">Gemini Live</h1>
                <p class="text-xs text-gray-500 font-medium uppercase tracking-wider">Multimodal Agent</p>
            </div>
            <div id="status-indicator" class="flex items-center gap-2 px-3 py-1 rounded-full bg-gray-100 text-[10px] font-bold text-gray-500 transition-all">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-400"></span>
                <span id="status-text">READY</span>
            </div>
        </div>

        <!-- API Key Section -->
        <div class="p-6 space-y-4">
            <div id="api-key-container">
                <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase">Enter Gemini API Key</label>
                <input id="api-key" type="password" placeholder="AIzaSy..." 
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <p class="text-[10px] text-gray-400 mt-1">Your key is not stored on any server.</p>
            </div>

            <!-- Transcript Area -->
            <div id="transcript-container" class="hidden space-y-2">
                <label class="block text-xs font-semibold text-gray-500 uppercase">Live Transcript</label>
                <div id="transcript" class="h-40 overflow-y-auto p-4 bg-gray-50 rounded-xl border border-gray-100 text-sm text-gray-700 leading-relaxed italic">
                    Waiting for conversation...
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col items-center justify-center py-4 gap-4">
                <button id="start-btn" class="w-20 h-20 rounded-full bg-black text-white flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all disabled:bg-gray-300 disabled:cursor-not-allowed">
                    <iconify-icon id="mic-icon" icon="lucide:mic" width="32"></iconify-icon>
                </button>
                <p id="instruction" class="text-sm font-medium text-gray-500">Click to start conversation</p>
                
                <button id="stop-btn" class="hidden px-6 py-2 bg-red-50 text-red-600 rounded-full text-xs font-bold hover:bg-red-100 transition-all">
                    END SESSION
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center">
            <select id="mic-select" class="text-[10px] bg-transparent font-bold text-gray-500 outline-none cursor-pointer uppercase">
                <option value="">Default Mic</option>
            </select>
            <span class="text-[10px] text-gray-400 font-medium">v2.5 Flash Native</span>
        </div>
    </div>

    <script>
        /**
         * CONFIGURATION
         */
        const MODEL = "models/gemini-2.5-flash-native-audio-preview-12-2025";
        const HOST = "generativelanguage.googleapis.com";
        
        let ws = null;
        let audioCtx = null;
        let mediaStream = null;
        let processor = null;
        let isConnected = false;
        let nextStartTime = 0;

        // UI Elements
        const apiKeyInput = document.getElementById('api-key');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const transcript = document.getElementById('transcript');
        const transcriptContainer = document.getElementById('transcript-container');
        const micIcon = document.getElementById('mic-icon');
        const instruction = document.getElementById('instruction');
        const micSelect = document.getElementById('mic-select');

        /**
         * WEBSOCKET LOGIC
         */
        async function connect() {
            const key = apiKeyInput.value.trim();
            if (!key) {
                alert("Please enter your Gemini API Key first!");
                return;
            }

            const URL = `wss://${HOST}/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BiDiGenerateContent?key=${key}`;
            
            ws = new WebSocket(URL);

            ws.onopen = () => {
                console.log("Connected to Gemini");
                sendSetup();
                startAudio();
            };

            ws.onmessage = async (event) => {
                const response = JSON.parse(event.data);
                handleServerResponse(response);
            };

            ws.onclose = () => {
                stopSession();
                updateStatus(false);
            };

            ws.onerror = (err) => {
                console.error("WS Error:", err);
                alert("Connection error. Check your API key or internet.");
            };
        }

        function sendSetup() {
            const setup = {
                setup: {
                    model: MODEL,
                    generation_config: { response_modalities: ["audio"] }
                }
            };
            ws.send(JSON.stringify(setup));
        }

        function handleServerResponse(response) {
            // Handle Audio Data
            if (response.serverContent?.modelTurn?.parts) {
                const parts = response.serverContent.modelTurn.parts;
                parts.forEach(part => {
                    if (part.inlineData && part.inlineData.mimeType.includes('audio')) {
                        playAudioChunk(part.inlineData.data);
                    }
                    if (part.text) {
                        updateTranscript("Gemini: " + part.text);
                    }
                });
            }
        }

        /**
         * AUDIO PROCESSING
         */
        async function startAudio() {
            try {
                audioCtx = new AudioContext({ sampleRate: 24000 });
                const constraints = {
                    audio: micSelect.value ? { deviceId: micSelect.value } : true
                };
                
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                const source = audioCtx.createMediaStreamSource(mediaStream);
                
                // Audio Worklet for recording
                await audioCtx.audioWorklet.addModule(createWorkletUrl());
                processor = new AudioWorkletNode(audioCtx, 'recorder-worklet');
                
                processor.port.onmessage = (e) => {
                    const base64Data = arrayBufferToBase64(e.data);
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            realtime_input: {
                                media_chunks: [{
                                    mime_type: "audio/pcm;rate=16000",
                                    data: base64Data
                                }]
                            }
                        }));
                    }
                };

                source.connect(processor);
                updateStatus(true);
            } catch (err) {
                console.error("Mic Error:", err);
                alert("Could not access microphone.");
            }
        }

        function playAudioChunk(base64Audio) {
            const binary = atob(base64Audio);
            const len = binary.length;
            const bytes = new Int16Array(len / 2);
            for (let i = 0; i < len; i += 2) {
                bytes[i / 2] = (binary.charCodeAt(i + 1) << 8) | binary.charCodeAt(i);
            }

            const float32 = new Float32Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) {
                float32[i] = bytes[i] / 32768.0;
            }

            const buffer = audioCtx.createBuffer(1, float32.length, 24000);
            buffer.copyToChannel(float32, 0);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            
            const startTime = Math.max(nextStartTime, audioCtx.currentTime);
            source.start(startTime);
            nextStartTime = startTime + buffer.duration;
        }

        /**
         * HELPERS
         */
        function createWorkletUrl() {
            const code = `
                class RecorderWorklet extends AudioWorkletProcessor {
                    constructor() { super(); this.buffer = new Int16Array(2048); this.ptr = 0; }
                    process(inputs) {
                        const input = inputs[0][0];
                        if (!input) return true;
                        for (let i = 0; i < input.length; i++) {
                            this.buffer[this.ptr++] = input[i] * 32767;
                            if (this.ptr >= this.buffer.length) {
                                this.port.postMessage(this.buffer.buffer);
                                this.ptr = 0;
                            }
                        }
                        return true;
                    }
                }
                registerProcessor('recorder-worklet', RecorderWorklet);
            `;
            return URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        function updateStatus(connected) {
            isConnected = connected;
            if (connected) {
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500 status-pulse";
                statusText.innerText = "LIVE";
                statusText.className = "text-emerald-600";
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                transcriptContainer.classList.remove('hidden');
                instruction.innerText = "Listening...";
            } else {
                statusDot.className = "w-2 h-2 rounded-full bg-gray-400";
                statusText.innerText = "READY";
                statusText.className = "text-gray-500";
                startBtn.classList.remove('hidden');
                stopBtn.classList.add('hidden');
                instruction.innerText = "Click to start conversation";
            }
        }

        function updateTranscript(text) {
            if (transcript.innerText.includes("Waiting")) transcript.innerText = "";
            transcript.innerText += "\n" + text;
            transcript.scrollTop = transcript.scrollHeight;
        }

        function stopSession() {
            if (ws) ws.close();
            if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            if (audioCtx) audioCtx.close();
            updateStatus(false);
        }

        /**
         * INITIALIZATION
         */
        startBtn.onclick = connect;
        stopBtn.onclick = stopSession;

        // Get Microphones
        navigator.mediaDevices.enumerateDevices().then(devices => {
            devices.filter(d => d.kind === 'audioinput').forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.text = d.label || 'Microphone';
                micSelect.appendChild(opt);
            });
        });
    </script>
</body>
</html>
