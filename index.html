<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live Agent - Mic Toggle Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #020617);
            color: #f8fafc;
            overflow: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .mic-shadow {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); /* Emerald glow for live mic */
        }
        .live-pulse {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(.33); }
            80%, 100% { opacity: 0; }
        }
        #transcript::-webkit-scrollbar { width: 5px; }
        #transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        /* Ensures AI text formatting like newlines are maintained */
        .bot-text {
            white-space: pre-wrap; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg glass rounded-[2.5rem] shadow-2xl overflow-hidden relative">
        <!-- Status Bar -->
        <div class="px-8 py-6 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-600/20 flex items-center justify-center">
                    <iconify-icon icon="logos:google-gemini" width="24"></iconify-icon>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">Gemini Live</h1>
                    <div class="flex items-center gap-2">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-500"></span>
                        <span id="status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Disconnected</span>
                    </div>
                </div>
            </div>
            <button id="settings-toggle" class="text-slate-400 hover:text-white transition-colors">
                <iconify-icon icon="lucide:settings" width="20"></iconify-icon>
            </button>
        </div>

        <!-- Settings Panel -->
        <div id="settings-panel" class="px-8 py-4 bg-black/20 border-b border-white/5 hidden">
            <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">API Configuration</label>
            <div class="flex gap-2">
                <input id="api-key" type="password" placeholder="Enter Gemini API Key" 
                    class="flex-1 bg-slate-900/50 border border-white/10 rounded-lg px-4 py-2 text-xs outline-none focus:border-blue-500 transition-all">
                <button id="save-key" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold transition-all">SAVE</button>
            </div>
            <p class="text-[9px] text-slate-500 mt-2 italic">Key is saved locally in your browser.</p>
        </div>

        <!-- Main Content -->
        <div class="p-8 space-y-8">
            <!-- Transcript Area -->
            <div id="transcript-container" class="relative h-64 bg-black/20 rounded-3xl border border-white/5 p-6 overflow-hidden">
                <div id="transcript" class="h-full overflow-y-auto text-sm text-slate-300 leading-relaxed space-y-4">
                    <p id="initial-msg" class="text-slate-500 italic text-center mt-20">Connect to start the conversation...</p>
                </div>
                <div class="absolute bottom-0 left-0 w-full h-12 bg-gradient-to-t from-slate-900/80 to-transparent pointer-events-none"></div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col items-center justify-center gap-6">
                <!-- Main Toggle Button -->
                <div class="relative">
                    <div id="pulse-ring" class="absolute inset-0 rounded-full bg-emerald-500/30 live-pulse hidden"></div>
                    <button id="main-btn" class="relative w-24 h-24 rounded-full bg-white text-slate-900 flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-all duration-300">
                        <iconify-icon id="btn-icon" icon="lucide:mic" width="36"></iconify-icon>
                    </button>
                </div>
                
                <div class="text-center">
                    <p id="instruction" class="text-sm font-semibold text-slate-400 transition-all">Tap to start session</p>
                    
                    <!-- Separate Disconnect Button -->
                    <button id="stop-btn" class="hidden mt-4 px-6 py-2 bg-slate-800 text-slate-300 rounded-full text-[10px] font-bold border border-slate-700 hover:bg-red-500 hover:text-white transition-all">
                        END CONVERSATION
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-8 py-4 bg-white/5 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <iconify-icon icon="lucide:mic-2" class="text-slate-500"></iconify-icon>
                <select id="mic-select" class="bg-transparent text-[10px] font-bold text-slate-500 outline-none cursor-pointer uppercase max-w-[120px] truncate">
                    <option value="">Default Mic</option>
                </select>
            </div>
            <span class="text-[10px] font-mono text-slate-600">ZEPHYR VOICE • 2.5 FLASH</span>
        </div>
    </div>

    <script>
        // --- CONFIG & STATE ---
        const MODEL = "models/gemini-2.5-flash-native-audio-preview-12-2025";
        const WS_URL = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent";
        
        let socket = null;
        let audioCtx = null;
        let stream = null;
        let processor = null;
        let nextTime = 0;
        
        let isLive = false;   // Is WebSocket connected?
        let isMuted = false;  // Is Mic paused by user?
        let currentBotBubble = null; 

        // UI Elements
        const mainBtn = document.getElementById('main-btn');
        const btnIcon = document.getElementById('btn-icon');
        const stopBtn = document.getElementById('stop-btn');
        const pulseRing = document.getElementById('pulse-ring');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const transcript = document.getElementById('transcript');
        const initialMsg = document.getElementById('initial-msg');
        const apiKeyInput = document.getElementById('api-key');
        const settingsPanel = document.getElementById('settings-panel');
        const micSelect = document.getElementById('mic-select');
        const instruction = document.getElementById('instruction');

        // --- API KEY PERSISTENCE ---
        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
                statusText.innerText = "Ready to connect";
            } else {
                settingsPanel.classList.remove('hidden');
            }
            populateMics();
        };

        document.getElementById('save-key').onclick = () => {
            localStorage.setItem('gemini_api_key', apiKeyInput.value.trim());
            settingsPanel.classList.add('hidden');
            alert("API Key Saved!");
        };

        document.getElementById('settings-toggle').onclick = () => settingsPanel.classList.toggle('hidden');

        // --- CORE LOGIC ---
        async function startSession() {
            const key = apiKeyInput.value.trim();
            if (!key) return alert("Please enter API Key in settings!");

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            updateStatus('Connecting...', 'bg-yellow-500');

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    audio: micSelect.value ? { deviceId: micSelect.value } : true
                });

                socket = new WebSocket(`${WS_URL}?key=${key}`);

                socket.onopen = () => {
                    const setup = {
                        setup: {
                            model: MODEL,
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: { prebuiltVoiceConfig: { voiceName: "Zephyr" } }
                                }
                            }
                        }
                    };
                    socket.send(JSON.stringify(setup));
                    
                    isLive = true;
                    isMuted = false;
                    initAudio();
                    updateUIState();
                    addTranscript("System", "Connection established. Start speaking!");
                };

                socket.onmessage = async (e) => {
                    const data = JSON.parse(e.data);
                    
                    // Handle Text and Audio Output from Gemini
                    if (data.serverContent?.modelTurn?.parts) {
                        data.serverContent.modelTurn.parts.forEach(p => {
                            if (p.inlineData && p.inlineData.data) {
                                playAudio(p.inlineData.data);
                            }
                            if (p.text) {
                                appendBotText(p.text);
                            }
                        });
                    }

                    // Reset Bot Bubble on Turn Complete
                    if (data.serverContent?.turnComplete) {
                        currentBotBubble = null; 
                    }
                };

                socket.onclose = () => stopSession();
                socket.onerror = () => {
                    alert("Connection Error! Check internet or API Key.");
                    stopSession();
                };

            } catch (err) {
                console.error(err);
                alert("Mic Access Denied or System Error!");
                stopSession();
            }
        }

        async function initAudio() {
            const source = audioCtx.createMediaStreamSource(stream);

            // AudioWorklet for Mic Capture
            const workletCode = `
                class P extends AudioWorkletProcessor {
                    process(inputs) {
                        const input = inputs[0][0];
                        if (input) {
                            const i16 = new Int16Array(input.length);
                            for (let i=0; i<input.length; i++) i16[i] = input[i] * 0x7FFF;
                            this.port.postMessage(i16.buffer);
                        }
                        return true;
                    }
                }
                registerProcessor('p', P);
            `;
            const blob = new Blob([workletCode], { type: 'application/javascript' });
            await audioCtx.audioWorklet.addModule(URL.createObjectURL(blob));
            
            processor = new AudioWorkletNode(audioCtx, 'p');
            
            let pcmBuffer =[];
            processor.port.onmessage = (e) => {
                if (!isLive || socket?.readyState !== WebSocket.OPEN) return;
                
                // MUTE LOGIC: If muted, do not send requests, empty the buffer.
                if (isMuted) {
                    pcmBuffer =[]; 
                    return; 
                }
                
                const arr = new Uint8Array(e.data);
                for(let i = 0; i < arr.length; i++) pcmBuffer.push(arr[i]);

                // Send data every ~100ms (3200 bytes)
                if (pcmBuffer.length >= 3200) {
                    const chunk = new Uint8Array(pcmBuffer);
                    pcmBuffer =[];
                    
                    let binary = '';
                    for (let i = 0; i < chunk.length; i++) binary += String.fromCharCode(chunk[i]);
                    const b64 = btoa(binary);

                    socket.send(JSON.stringify({
                        realtimeInput: {
                            mediaChunks:[{ mimeType: "audio/pcm;rate=16000", data: b64 }]
                        }
                    }));
                }
            };
            source.connect(processor);
        }

        function playAudio(b64) {
            const bin = atob(b64);
            const buffer = new ArrayBuffer(bin.length);
            const view = new Uint8Array(buffer);
            for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
            
            const i16 = new Int16Array(buffer);
            const f32 = new Float32Array(i16.length);
            for (let i=0; i<i16.length; i++) f32[i] = i16[i] / 32768;

            const buf = audioCtx.createBuffer(1, f32.length, 24000);
            buf.copyToChannel(f32, 0);
            const node = audioCtx.createBufferSource();
            node.buffer = buf;
            node.connect(audioCtx.destination);
            
            let now = audioCtx.currentTime;
            if (nextTime < now) nextTime = now;
            
            node.start(nextTime);
            nextTime += buf.duration;
        }

        // --- UI STATE MANAGEMENT ---
        function toggleMute() {
            isMuted = !isMuted;
            updateUIState();
        }

        function updateUIState() {
            if (!isLive) {
                // Completely disconnected state
                mainBtn.className = "relative w-24 h-24 rounded-full bg-white text-slate-900 flex items-center justify-center shadow-xl hover:scale-105 active:scale-95 transition-all duration-300";
                btnIcon.setAttribute('icon', 'lucide:mic');
                pulseRing.classList.add('hidden');
                stopBtn.classList.add('hidden');
                instruction.innerText = "Tap to start session";
                updateStatus('Disconnected', 'bg-slate-500');
            } else if (isLive && !isMuted) {
                // Live and Listening (ON)
                mainBtn.className = "relative w-24 h-24 rounded-full bg-emerald-500 text-white flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-all duration-300 mic-shadow";
                btnIcon.setAttribute('icon', 'lucide:mic');
                pulseRing.classList.remove('hidden');
                stopBtn.classList.remove('hidden');
                instruction.innerText = "Listening... Tap to pause";
                updateStatus('Live', 'bg-emerald-500');
                if(initialMsg) initialMsg.style.display = 'none';
            } else if (isLive && isMuted) {
                // Live but Muted (OFF)
                mainBtn.className = "relative w-24 h-24 rounded-full bg-red-500 text-white flex items-center justify-center shadow-xl hover:scale-105 active:scale-95 transition-all duration-300";
                btnIcon.setAttribute('icon', 'lucide:mic-off');
                pulseRing.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                instruction.innerText = "Mic Paused. Tap to resume";
                updateStatus('Muted', 'bg-red-500');
            }
        }

        function updateStatus(txt, color) {
            statusText.innerText = txt;
            statusDot.className = `w-2 h-2 rounded-full ${color}`;
        }

        // Add System/User messages
        function addTranscript(role, text) {
            const div = document.createElement('div');
            div.className = "animate-in slide-in-from-bottom-2 duration-300 mb-4";
            div.innerHTML = `<span class="text-[10px] font-bold uppercase tracking-widest text-blue-400">${role}</span>
                           <p class="text-slate-200 mt-1">${text}</p>`;
            transcript.appendChild(div);
            transcript.scrollTop = transcript.scrollHeight;
        }

        // Append AI response progressively
        function appendBotText(text) {
            if (!currentBotBubble) {
                const div = document.createElement('div');
                div.className = "animate-in slide-in-from-bottom-2 duration-300 mb-4";
                div.innerHTML = `<span class="text-[10px] font-bold uppercase tracking-widest text-emerald-400">Gemini</span>
                               <p class="text-slate-200 mt-1 bot-text"></p>`;
                transcript.appendChild(div);
                currentBotBubble = div.querySelector('.bot-text');
            }
            currentBotBubble.innerHTML += text;
            transcript.scrollTop = transcript.scrollHeight;
        }

        function stopSession() {
            if (socket) {
                socket.close();
                socket = null;
            }
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (audioCtx) audioCtx.suspend(); 
            
            isLive = false;
            isMuted = false;
            nextTime = 0;
            currentBotBubble = null;
            updateUIState();
        }

        function populateMics() {
            navigator.mediaDevices.enumerateDevices().then(devs => {
                micSelect.innerHTML = '<option value="">Default Mic</option>';
                devs.filter(d => d.kind === 'audioinput').forEach(d => {
                    const o = document.createElement('option');
                    o.value = d.deviceId;
                    o.text = d.label || 'Microphone';
                    micSelect.appendChild(o);
                });
            });
        }

        // --- EVENT LISTENERS ---
        mainBtn.onclick = () => {
            if (!isLive) {
                startSession(); // Start session if disconnected
            } else {
                toggleMute();   // Toggle Mute/Unmute if connected
            }
        };
        
        stopBtn.onclick = stopSession; // End entire conversation
    </script>
</body>
</html>
