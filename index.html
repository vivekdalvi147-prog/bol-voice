<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live - Fixed Mic Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .live-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #ef4444;
            animation: ripple 1.5s linear infinite;
            opacity: 0;
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-card rounded-3xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
            <div>
                <h1 class="text-xl font-bold tracking-tight">Gemini Live AI</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-500"></span>
                    <span id="status-text" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Ready</span>
                </div>
            </div>
            <div class="bg-blue-500/20 p-2 rounded-lg">
                <iconify-icon icon="logos:google-gemini" width="24"></iconify-icon>
            </div>
        </div>

        <div class="p-6 space-y-6">
            <!-- API Key Section -->
            <div id="api-section">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Your Gemini API Key</label>
                <input id="api-key" type="password" placeholder="Paste AIzaSy... key here" 
                    class="w-full px-4 py-3 bg-slate-900/50 border border-white/10 rounded-xl text-sm focus:border-blue-500 outline-none transition-all">
            </div>

            <!-- Transcript Area -->
            <div id="transcript-box" class="hidden animate-fadeIn">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Live Transcript</label>
                <div id="transcript" class="h-40 overflow-y-auto p-4 bg-black/20 rounded-xl border border-white/5 text-sm text-gray-300 italic leading-relaxed">
                    Waiting for voice...
                </div>
            </div>

            <!-- Main Button -->
            <div class="flex flex-col items-center justify-center py-4">
                <div class="relative flex items-center justify-center">
                    <div id="ripple" class="hidden live-ring"></div>
                    <button id="main-btn" class="relative z-10 w-20 h-20 rounded-full bg-white text-slate-900 flex items-center justify-center shadow-xl hover:scale-105 active:scale-95 transition-all">
                        <iconify-icon id="btn-icon" icon="lucide:mic" width="32"></iconify-icon>
                    </button>
                </div>
                <p id="hint" class="mt-4 text-xs text-gray-400 font-medium">Tap to start conversation</p>
                
                <button id="stop-btn" class="hidden mt-6 px-6 py-2 bg-red-500/10 text-red-500 border border-red-500/20 rounded-full text-[10px] font-bold hover:bg-red-500 hover:text-white transition-all">
                    STOP SESSION
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 bg-black/20 border-t border-white/5 flex justify-between items-center">
            <select id="mic-select" class="text-[10px] bg-transparent font-bold text-gray-500 outline-none cursor-pointer uppercase max-w-[150px]">
                <option value="">Default Microphone</option>
            </select>
            <span class="text-[9px] text-gray-500 font-mono">MODEL: 2.5-FLASH-AUDIO</span>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const MODEL_ID = "models/gemini-2.5-flash-native-audio-preview-12-2025";
        const API_URL = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BiDiGenerateContent";

        let ws = null;
        let audioCtx = null;
        let micStream = null;
        let recorder = null;
        let nextTime = 0;
        let isRunning = false;

        // UI Elements
        const btn = document.getElementById('main-btn');
        const stopBtn = document.getElementById('stop-btn');
        const btnIcon = document.getElementById('btn-icon');
        const ripple = document.getElementById('ripple');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const transcript = document.getElementById('transcript');
        const apiInput = document.getElementById('api-key');
        const micSelect = document.getElementById('mic-select');

        /**
         * 1. MIC PERMISSION & START
         */
        async function startEverything() {
            const key = apiInput.value.trim();
            if (!key) {
                alert("Please enter your API Key first!");
                return;
            }

            try {
                // Force request permission
                micStream = await navigator.mediaDevices.getUserMedia({
                    audio: micSelect.value ? { deviceId: micSelect.value } : true
                });

                // If permission granted, start WebSocket
                initWebSocket(key);
            } catch (err) {
                console.error("Mic Error:", err);
                alert("Microphone access denied! Please enable it in browser settings.");
            }
        }

        /**
         * 2. WEBSOCKET LOGIC
         */
        function initWebSocket(key) {
            ws = new WebSocket(`${API_URL}?key=${key}`);

            ws.onopen = () => {
                updateStatus('Connected', 'bg-emerald-500');
                // Send Setup
                ws.send(JSON.stringify({
                    setup: { model: MODEL_ID, generation_config: { response_modalities: ["audio"] } }
                }));
                startAudioEngine();
                toggleUI(true);
            };

            ws.onmessage = async (e) => {
                const data = JSON.parse(e.data);
                if (data.serverContent?.modelTurn?.parts) {
                    data.serverContent.modelTurn.parts.forEach(p => {
                        if (p.inlineData) playAudio(p.inlineData.data);
                        if (p.text) showText("Gemini: " + p.text);
                    });
                }
            };

            ws.onclose = () => stopEverything();
            ws.onerror = () => {
                alert("Connection Error! Check API Key.");
                stopEverything();
            };
        }

        /**
         * 3. AUDIO ENGINE (INPUT/OUTPUT)
         */
        async function startAudioEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            const source = audioCtx.createMediaStreamSource(micStream);

            // Worklet for processing mic data
            const blob = new Blob([`
                class P extends AudioWorkletProcessor {
                    process(inputs) {
                        const input = inputs[0][0];
                        if (input) {
                            const i16 = new Int16Array(input.length);
                            for (let i=0; i<input.length; i++) i16[i] = input[i] * 0x7FFF;
                            this.port.postMessage(i16.buffer);
                        }
                        return true;
                    }
                }
                registerProcessor('p', P);
            `], { type: 'application/javascript' });

            await audioCtx.audioWorklet.addModule(URL.createObjectURL(blob));
            recorder = new AudioWorkletNode(audioCtx, 'p');

            recorder.port.onmessage = (e) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    const b64 = btoa(String.fromCharCode(...new Uint8Array(e.data)));
                    ws.send(JSON.stringify({
                        realtime_input: { media_chunks: [{ mime_type: "audio/pcm;rate=16000", data: b64 }] }
                    }));
                }
            };

            source.connect(recorder);
        }

        function playAudio(b64) {
            const bin = atob(b64);
            const i16 = new Int16Array(new Uint8Array([...bin].map(c => c.charCodeAt(0))).buffer);
            const f32 = new Float32Array(i16.length);
            for (let i=0; i<i16.length; i++) f32[i] = i16[i] / 32768;

            const buf = audioCtx.createBuffer(1, f32.length, 24000);
            buf.copyToChannel(f32, 0);
            const node = audioCtx.createBufferSource();
            node.buffer = buf;
            node.connect(audioCtx.destination);
            
            const start = Math.max(nextTime, audioCtx.currentTime);
            node.start(start);
            nextTime = start + buf.duration;
        }

        /**
         * 4. UI HELPERS
         */
        function toggleUI(on) {
            isRunning = on;
            btn.classList.toggle('bg-red-500', on);
            btn.classList.toggle('text-white', on);
            btnIcon.setAttribute('icon', on ? 'lucide:mic-off' : 'lucide:mic');
            ripple.classList.toggle('hidden', !on);
            stopBtn.classList.toggle('hidden', !on);
            document.getElementById('api-section').classList.toggle('hidden', on);
            document.getElementById('transcript-box').classList.toggle('hidden', !on);
            document.getElementById('hint').innerText = on ? "I'm listening..." : "Tap to start conversation";
        }

        function updateStatus(txt, color) {
            statusText.innerText = txt;
            statusDot.className = `w-2 h-2 rounded-full ${color}`;
        }

        function showText(t) {
            if (transcript.innerText.includes("Waiting")) transcript.innerText = "";
            transcript.innerHTML += `<p class="mb-2 border-l-2 border-blue-500 pl-2">${t}</p>`;
            transcript.scrollTop = transcript.scrollHeight;
        }

        function stopEverything() {
            if (ws) ws.close();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            if (audioCtx) audioCtx.close();
            toggleUI(false);
            updateStatus('Ready', 'bg-gray-500');
            nextTime = 0;
        }

        // Mic List
        navigator.mediaDevices.enumerateDevices().then(devs => {
            micSelect.innerHTML = '<option value="">Default Mic</option>';
            devs.filter(d => d.kind === 'audioinput').forEach(d => {
                const o = document.createElement('option');
                o.value = d.deviceId;
                o.text = d.label || 'Microphone';
                micSelect.appendChild(o);
            });
        });

        btn.onclick = () => isRunning ? stopEverything() : startEverything();
        stopBtn.onclick = stopEverything;

    </script>
</body>
</html>
